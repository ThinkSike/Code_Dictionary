<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Club Membership Form</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <form id="registrationForm">
        <h1>Membership Registration</h1>

        <label>First Name:</label>
        <input type="text" name="firstname" required placeholder="eg. John">

        <label>Middle Name:</label>
        <input type="text" name="lastname" required placeholder="(Optional)">

        <label>Last Name:</label>
        <input type="text" name="lastname" required placeholder="eg. Doe">

        <label>Password:</label>
        <input type="password" name="password" required>

        <label>Email:</label>
        <input type="email" id="email" name="email" required placeholder="user@example.com">

        <label>Phone:</label>
        <input type="tel" id="phone" name="phone" required placeholder="123-456-7890">

        <label>Home Address:</label>
        <textarea name="address" rows="4" required></textarea>

        <label>Gender:</label>
        <input type="radio" name="gender" value="Male" required> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other

        <label>Date of Birth:</label>
        <input type="date" name="dob" required>

        <label>Upload Resume:</label>
        <input type="file" name="resume" required>

        <label>Upload Profile Picture:</label>
        <input type="file" name="profile" accept="image/*">

        <label>Search Club:</label>
        <input type="text" id="searchClub" placeholder="Search for a club...">

        <label>Select Club(s):</label>
        <div id="clubList">
            <label><input type="checkbox" name="clubs" value="Editing Club">Editing Club</label>
            <label><input type="checkbox" name="clubs" value="Art Club">Art and Culture Club</label>
            <label><input type="checkbox" name="clubs" value="Coding Club">Coding Club</label>
            <label><input type="checkbox" name="clubs" value="Gaming Club">Gaming Club</label>
            <label><input type="checkbox" name="clubs" value="Music Club">Content Creation Club</label>
        </div>

        <label>Preferred Time for Contact:</label>
        <input type="time" name="time">
        
        <label>Introversion Level:</label>
        <input type="range" min="0" max="100" name="introversionLevel" required>

        <label>Joining Month:</label>
        <input type="month" name="month">

        <!-- <button type="button" onclick="alert('Button Clicked')">Click Me</button> -->
        <input type="reset">
        <input type="submit" value="Submit"><br>
    </form>
</body>
</html>
