<body>

    <form>
        <h1>Membership Registration Form</h1>
        <!-- (Textbox)-->
        <label for="Name">Full Name:</label>  <br>
        <input type="text" id="fname" name="fname" hint="First name">
        <input type="text" id="lname" name="lname" hint="Last name"><br>

        <!-- Email -->
        <label for="email">Email:</label>  <br>
        <input type="text" id="email" name="email" hint="example@abc.com"><br>

        <!-- Phone, Number -->
        <label for="Phone">Contact no.:</label>  <br>
        <input type="text" id="phno" name="phno" hint="123-456-7890"><br>

        <!-- Textarea -->
        <label for="Textarea">Home Address:</label>  <br>
        <textarea id="Textarea" name="Textarea" rows="5" cols="33" hint="Tell us about yourself.." type=text></textarea><br>

        <!-- Radio -->
        <label for="Radio">Gender:</label>  <br>

            <input type="radio" name="options" value="Male">
            <label for="Male" class="btn gender">Male</label> 

            <input type="radio" name="options" value="NA">
            <label for="NA" class="btn gender">Not prefer to say</label> <br> 

            <input type="radio" name="options" value="Female">
            <label for="Female" class="btn gender">Female</label> <br>

        <!-- Date, Month -->
        <label for="Date">Date of Birth:</label>  <br>
        <input type="date" id="date" name="date" hint="Select Date"><br>
        
        <!-- Textarea -->
        <label for="Textarea">Why do you want to be a part of this club?:</label>  <br>
        <textarea id="textarea2" name="textarea2" rows="5" cols="33" hint="Tell us about yourself.." type=text></textarea><br>

                <option value="Coding Club"><input type="checkbox" value="Editing Club">Coding Club</option>
                <option value="Blogging Club"><input type="checkbox" value="Editing Club">Blogging Club</option>
